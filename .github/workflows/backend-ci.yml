name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'database/migrations/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'database/migrations/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # tracks go.mod (currently 1.25); never hard-code
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      # Advisory: surfaces lint findings without blocking the pipeline. Flip to blocking
      # (remove continue-on-error) once the codebase is clean against .golangci.yml.
      - name: Lint (advisory)
        uses: golangci/golangci-lint-action@v6
        continue-on-error: true
        with:
          version: latest
          args: --timeout=5m

      # Curated unit packages — fast (< 5 min, execution rule 1) and self-contained. The
      # ./internal/test E2E suite needs a live Postgres/Redis/Kafka and is intentionally
      # excluded here (run it from a dedicated integration workflow with services).
      # ./internal/driver/... is omitted pending verification; it vets/compiles clean but
      # was not confirmed green in this pass — add it once validated on a CI runner.
      - name: Test (race + coverage)
        run: |
          go test -race -count=1 -timeout 120s -coverprofile=coverage.out \
            ./internal/dispatch/... \
            ./internal/routing/... \
            ./internal/surge/... \
            ./internal/telemetry/... \
            ./internal/pricing/... \
            ./internal/rider/...

      # Advisory coverage gate (user choice): measure + report, don't fail the build.
      # Set COVERAGE_THRESHOLD and remove continue-on-error to enforce.
      - name: Coverage gate (advisory, target 75%)
        continue-on-error: true
        env:
          COVERAGE_THRESHOLD: '75'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}% (target ${COVERAGE_THRESHOLD}%)"
          awk -v cov="$COVERAGE" -v min="$COVERAGE_THRESHOLD" 'BEGIN {
            if (cov + 0 < min + 0) { print "WARN: " cov "% is below the " min "% target"; exit 1 }
            print "PASS: " cov "% >= " min "%"
          }'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: ./coverage.out
          flags: backend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, dispatch, pricing, notification, analytics, surge, ingestion]
    steps:
      - uses: actions/checkout@v4

      # ghcr requires a lowercase namespace; the owner login (Itinerant18) has uppercase.
      - name: Lowercase image namespace
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # built-in; no PAT required

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: TARGET_SERVICE=${{ matrix.service }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/dfu-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/dfu-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  security-scan:
    needs: [build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write   # upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image namespace
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      # Advisory: gosec findings go to the Security tab, they do not fail the build.
      - name: gosec (SARIF)
        continue-on-error: true
        uses: securego/gosec@master
        with:
          args: -no-fail -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Advisory: Trivy HIGH/CRITICAL findings reported to the Security tab (exit-code 0).
      - name: Trivy image scan (gateway, SARIF)
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.OWNER_LC }}/dfu-gateway:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy
