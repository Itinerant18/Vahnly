name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  docker-images:
    name: Build & Push Docker Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - analytics
          - dispatch
          - expiry
          - gateway
          - ingestion
          - migrate
          - notification
          - pricing
          - pruner
          - rebalancer
          - reconciler
          - surge
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repo name to lowercase
        run: |
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            TARGET_SERVICE=${{ matrix.service }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ github.ref_name }}
            ghcr.io/${{ env.REPO_LOWER }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker-images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Update Helm Chart Version to Match Tag
        run: |
          # Strip 'v' prefix from tag for SemVer compliance in Helm
          TAG_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          sed -i "s/^version: .*/version: ${TAG_VERSION}/" deploy/charts/vahnly/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${{ github.ref_name }}\"/" deploy/charts/vahnly/Chart.yaml

      - name: Package Helm Chart
        run: |
          mkdir dist
          helm package deploy/charts/vahnly/ --destination dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
