name: Admin CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

defaults:
  run:
    working-directory: frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-build-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  e2e:
    needs: [test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install e2e deps
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Start admin dev server
        run: npm run dev &
        working-directory: frontend

      - name: Wait for server
        run: npx --yes wait-on http://localhost:5000 -t 120000
        working-directory: e2e

      - name: Run Playwright (admin)
        run: npm test -- --project=admin
        working-directory: e2e
        env:
          # The Vite dev server (frontend/vite.config) binds :5000; the Playwright
          # admin project otherwise defaults to :5173 -> ERR_CONNECTION_REFUSED.
          ADMIN_URL: http://localhost:5000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-admin-${{ github.sha }}
          path: e2e/playwright-report/
          retention-days: 14
