name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m


  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Go vet
        run: go vet ./...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: go test -v -race -count=1 -timeout 120s ./internal/dispatch/... ./internal/routing/... ./internal/surge/... ./internal/telemetry/... ./internal/pricing/...
        # NOTE: E2E tests in ./internal/test/ are skipped automatically
        # because DATABASE_URL/REDIS_CLUSTER_NODES/KAFKA_BROKERS are not set.

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, vet, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build dispatch service
        run: go build -o bin/dispatch ./cmd/dispatch/
      - name: Build ingestion service
        run: go build -o bin/ingestion ./cmd/ingestion/
      - name: Build gateway service
        run: go build -o bin/gateway ./cmd/gateway/
      - name: Build reconciler service
        run: go build -o bin/reconciler ./cmd/reconciler/
      - name: Build pruner service
        run: go build -o bin/pruner ./cmd/pruner/
      - name: Build pricing service
        run: go build -o bin/pricing ./cmd/pricing/
      - name: Build surge service
        run: go build -o bin/surge ./cmd/surge/
      - name: Build migrate utility
        run: go build -o bin/migrate ./cmd/migrate/
      - name: Build osm-preprocessor utility
        run: go build -o bin/osm-preprocessor ./cmd/osm-preprocessor/
      - name: Build simulator runner
        run: go build -o bin/simulator ./cmd/simulator/
      - name: Build expiry service
        run: go build -o bin/expiry ./cmd/expiry/
      - name: Verify binaries exist
        run: ls -la bin/

