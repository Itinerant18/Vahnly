name: Rider App CI

on:
  push:
    branches: [main]
    paths:
      - 'rider-app/**'
      - 'e2e/**'
  pull_request:
    branches: [main]
    paths:
      - 'rider-app/**'
      - 'e2e/**'

defaults:
  run:
    working-directory: rider-app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rider-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rider-app-build-${{ github.sha }}
          path: rider-app/out/
          retention-days: 7

  e2e:
    needs: [test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            rider-app/package-lock.json
            e2e/package-lock.json

      - name: Install rider-app deps
        run: npm ci
        working-directory: rider-app

      - name: Install e2e deps
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Start rider-app dev server
        run: npm run dev &
        working-directory: rider-app

      - name: Wait for server
        run: npx --yes wait-on http://localhost:3050 -t 120000
        working-directory: e2e

      - name: Run Playwright (rider + design)
        run: npm test -- --project=rider --project=design
        working-directory: e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-rider-${{ github.sha }}
          path: e2e/playwright-report/
          retention-days: 14
