name: VM Deploy

# Ships the GHCR images Backend CI just built to the production VM (dfu-stack), which serves
# api.aniket.site behind Caddy. Runs ONLY after Backend CI succeeds on main, so a push that
# fails to build images never deploys. Replaces the k8s "Deploy" workflow's no-op for the
# VM-hosted backend.
#
# ── One-time setup ──────────────────────────────────────────────────────────────────────
#   Required: Secret  GCP_SA_KEY — JSON key of a service account that can SSH the VM. Grant:
#                                  roles/compute.instanceAdmin.v1  +  roles/iam.serviceAccountUser
#       gcloud iam service-accounts create github-vm-deploy --project=vahnly-platform
#       EMAIL=github-vm-deploy@vahnly-platform.iam.gserviceaccount.com
#       gcloud projects add-iam-policy-binding vahnly-platform --member="serviceAccount:$EMAIL" --role=roles/compute.instanceAdmin.v1
#       gcloud projects add-iam-policy-binding vahnly-platform --member="serviceAccount:$EMAIL" --role=roles/iam.serviceAccountUser
#       gcloud iam service-accounts keys create key.json --iam-account=$EMAIL
#       gh secret set GCP_SA_KEY --repo Itinerant18/Vahnly < key.json && rm key.json
#   Optional: Variable VM_COMPOSE_DIR — absolute dir holding docker-compose*.yml. If unset,
#             the job auto-discovers it on the VM (and fails clearly if there's more than one).
#   Optional: Variable VM_HEALTH_URL  — health URL to smoke-test (default below).
# Until GCP_SA_KEY exists, the job skips cleanly (green, never red).

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: vm-deploy
  cancel-in-progress: false

env:
  VM_NAME: dfu-stack
  VM_ZONE: asia-south1-c
  VM_PROJECT: vahnly-platform

jobs:
  deploy:
    # Deploy on a manual run, or when Backend CI completed successfully on main.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve config (skip cleanly if the deploy key is unset)
        id: guard
        # Evaluate presence in the expression context — never interpolate the secret value
        # into the shell (the JSON key has quotes/newlines that would break parsing).
        env:
          HAS_KEY: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          if [ "$HAS_KEY" = "true" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VM deploy skipped — add the GCP_SA_KEY secret to enable it."
          fi

      - name: Authenticate to Google Cloud
        if: steps.guard.outputs.ready == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        if: steps.guard.outputs.ready == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Build remote deploy script
        if: steps.guard.outputs.ready == 'true'
        run: |
          # Single-quoted heredoc keeps the script literal; the optional VM_COMPOSE_DIR
          # override is injected by sed so paths with spaces survive.
          cat > remote-deploy.sh <<'REMOTE'
          set -e
          DIR="__OVERRIDE__"
          if [ -z "$DIR" ]; then
            matches=$(find /opt /srv /home /root "$HOME" -maxdepth 4 -name 'docker-compose*.y*ml' 2>/dev/null || true)
            n=$(printf '%s\n' "$matches" | grep -c . || true)
            if [ "$n" != "1" ]; then
              echo "Set the VM_COMPOSE_DIR variable — auto-discovery found $n docker-compose files:"
              printf '%s\n' "$matches"
              exit 1
            fi
            DIR=$(dirname "$matches")
          fi
          echo "Deploying from: $DIR"
          cd "$DIR"
          # The compose builds the app services from source (build: context: .), so the
          # deploy updates the checkout and rebuilds — pulling GHCR images would be a no-op.
          # The SSH deploy user isn't the repo owner, so mark the checkout a safe directory.
          git config --global --add safe.directory "$DIR"
          git pull --ff-only origin main
          docker compose pull            # refresh third-party images (postgres/redis/kafka)
          docker compose up -d --build --remove-orphans
          docker image prune -f || true
          REMOTE
          sed -i "s|__OVERRIDE__|${{ vars.VM_COMPOSE_DIR }}|" remote-deploy.sh

      - name: Pull images + restart on the VM
        if: steps.guard.outputs.ready == 'true'
        # SSH as the checkout owner (VM_SSH_USER, default 'itine') so git pull + the
        # source rebuild have write access to the repo. The SA needs compute.instanceAdmin
        # to push its key to that user.
        run: |
          USER='${{ vars.VM_SSH_USER }}'; [ -z "$USER" ] && USER='itine'
          gcloud compute ssh "$USER@$VM_NAME" \
            --zone="$VM_ZONE" --project="$VM_PROJECT" --quiet \
            --command="$(cat remote-deploy.sh)"

      - name: Smoke test
        if: steps.guard.outputs.ready == 'true'
        run: |
          URL='${{ vars.VM_HEALTH_URL }}'
          [ -z "$URL" ] && URL='https://api.aniket.site/api/v1/config/flags'
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || true)
            if [ "$code" = "200" ]; then echo "gateway healthy ($URL)"; exit 0; fi
            echo "attempt $i: $code — retrying"; sleep 6
          done
          echo "gateway did not return 200 at $URL after deploy"; exit 1
