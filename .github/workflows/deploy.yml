name: Deploy

on:
  push:
    branches: [main]

# Prevent concurrent deploys to the same environment.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, dispatch, pricing, notification, analytics, surge, ingestion]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: TARGET_SERVICE=${{ matrix.service }}
          tags: |
            ${{ env.IMAGE_BASE }}/dfu-${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/dfu-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  staging-deploy:
    needs: [build-images]
    runs-on: ubuntu-latest
    environment: staging
    env:
      NAMESPACE: dfu-staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm lint
        run: helm lint deploy/charts/drivers-for-u/

      - name: Deploy to staging
        run: |
          helm upgrade --install drivers-for-u ./deploy/charts/drivers-for-u \
            --namespace $NAMESPACE \
            --create-namespace \
            -f ./deploy/production-values.yaml \
            --set image.repository=${{ env.IMAGE_BASE }}/dfu-gateway \
            --set image.tag=${{ github.sha }} \
            --wait \
            --timeout 5m

      - name: Smoke test
        run: |
          curl -sf https://api-staging.driversforu.com/health | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"

      - name: Rollback on failure
        if: failure()
        run: helm rollback drivers-for-u -n $NAMESPACE || true

  production-deploy:
    needs: [staging-deploy]
    runs-on: ubuntu-latest
    environment: production
    env:
      NAMESPACE: dfu-production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to production
        run: |
          helm upgrade --install drivers-for-u ./deploy/charts/drivers-for-u \
            --namespace $NAMESPACE \
            --create-namespace \
            -f ./deploy/production-values.yaml \
            --set image.repository=${{ env.IMAGE_BASE }}/dfu-gateway \
            --set image.tag=${{ github.sha }} \
            --wait \
            --timeout 5m

      - name: Smoke test
        run: |
          curl -sf https://api.driversforu.com/health | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"

      - name: Rollback on failure
        if: failure()
        run: helm rollback drivers-for-u -n $NAMESPACE || true
