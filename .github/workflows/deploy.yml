name: Deploy

# Runs only AFTER Backend CI succeeds on main (execution rule 3), or on manual dispatch.
# It does NOT rebuild images — it deploys the ones Backend CI already pushed for the commit.
on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (commit SHA) to deploy'
        required: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # Guard: secrets cannot be read in job-level `if`, so resolve their presence here and
  # gate the deploy jobs on the outputs. When a kubeconfig is absent the deploy job is
  # SKIPPED (green), never failed — so an unconfigured repo doesn't red every push.
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has_staging: ${{ steps.c.outputs.has_staging }}
      has_production: ${{ steps.c.outputs.has_production }}
      image_tag: ${{ steps.c.outputs.image_tag }}
      owner_lc: ${{ steps.c.outputs.owner_lc }}
    steps:
      - id: c
        env:
          KS: ${{ secrets.KUBECONFIG_STAGING }}
          KP: ${{ secrets.KUBECONFIG_PRODUCTION }}
          TAG: ${{ github.event.inputs.image_tag || github.event.workflow_run.head_sha || github.sha }}
        run: |
          { [ -n "$KS" ] && echo "has_staging=true" || echo "has_staging=false"; } >> "$GITHUB_OUTPUT"
          { [ -n "$KP" ] && echo "has_production=true" || echo "has_production=false"; } >> "$GITHUB_OUTPUT"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

  staging-deploy:
    needs: [check-secrets]
    # Deploy only when CI succeeded on main (or manual), AND a staging kubeconfig exists.
    if: >-
      ${{ needs.check-secrets.outputs.has_staging == 'true' &&
          (github.event_name == 'workflow_dispatch' ||
           (github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.head_branch == 'main')) }}
    runs-on: ubuntu-latest
    environment: staging
    env:
      NAMESPACE: dfu-staging
      IMAGE_TAG: ${{ needs.check-secrets.outputs.image_tag }}
      OWNER_LC: ${{ needs.check-secrets.outputs.owner_lc }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm lint
        run: helm lint deploy/charts/vahnly/

      - name: Deploy to staging
        run: |
          helm upgrade --install vahnly ./deploy/charts/vahnly \
            --namespace "$NAMESPACE" --create-namespace \
            -f ./deploy/production-values.yaml \
            --set image.repository=${REGISTRY}/${OWNER_LC}/dfu-gateway \
            --set image.tag="$IMAGE_TAG" \
            --wait --timeout 5m

      - name: Smoke test
        run: |
          curl -sf https://api.aniket.site/health | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"

      - name: Rollback on failure
        if: failure()
        run: helm rollback vahnly -n "$NAMESPACE" || true

  production-deploy:
    needs: [check-secrets, staging-deploy]
    if: ${{ needs.check-secrets.outputs.has_production == 'true' }}
    runs-on: ubuntu-latest
    environment: production   # add required reviewers here for manual approval
    env:
      NAMESPACE: dfu-production
      IMAGE_TAG: ${{ needs.check-secrets.outputs.image_tag }}
      OWNER_LC: ${{ needs.check-secrets.outputs.owner_lc }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to production
        run: |
          helm upgrade --install vahnly ./deploy/charts/vahnly \
            --namespace "$NAMESPACE" --create-namespace \
            -f ./deploy/production-values.yaml \
            --set image.repository=${REGISTRY}/${OWNER_LC}/dfu-gateway \
            --set image.tag="$IMAGE_TAG" \
            --wait --timeout 5m

      - name: Smoke test
        run: |
          curl -sf https://api.aniket.site/health | \
            python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', d"

      - name: Rollback on failure
        if: failure()
        run: helm rollback vahnly -n "$NAMESPACE" || true
