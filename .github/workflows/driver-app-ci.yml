name: Driver App CI

on:
  push:
    branches: [main]
    paths:
      - 'client-app/**'
  pull_request:
    branches: [main]
    paths:
      - 'client-app/**'

defaults:
  run:
    working-directory: client-app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: driver-app-build-${{ github.sha }}
          path: client-app/out/
          retention-days: 7

  # NOTE: no Playwright e2e job here — e2e/playwright.config.ts defines projects
  # rider / admin / design / visual, but no "driver" project. The driver app's
  # interactive flows are covered by its Vitest suite (npm test) above. Add a "driver"
  # project to e2e/playwright.config.ts to reinstate a browser e2e job.
