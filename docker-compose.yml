networks:
  dispatch-tier:
    name: dispatch_network
    driver: bridge

services:
  # ============================================================================
  # 1. RELATIONAL SPATIAL STORE (POSTGRESQL + POSTGIS)
  # ============================================================================
  spatial-db:
    image: postgis/postgis:15-3.3
    container_name: spatial_postgres_dev
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=delivery_platform
    ports:
      - "5432:5432"
    networks:
      - dispatch-tier
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================================
  # 2. EVENT BACKBONE BROKER (KAFKA IN KRAFT MODE)
  # ============================================================================
  kafka-broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka_kraft_dev
    ports:
      - "9092:9092"
      - "19092:19092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-broker:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:19092
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka-broker:9092,EXTERNAL://127.0.0.1:19092
      - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
    networks:
      - dispatch-tier
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================================
  # 3. HIGH-VELOCITY INTELLIGENCE TIER (NVIDIA TRITON SERVER)
  # ============================================================================
  triton-server:
    image: nvcr.io/nvidia/tritonserver:24.01-py3
    container_name: triton_inference_dev
    command: ["tritonserver", "--model-repository=/models"]
    ports:
      - "8000:8000"
      - "8001:8001" # Target gRPC Port binding for your ETACorrector Client
      - "8002:8002"
    volumes:
      - ./model_repository:/models
    networks:
      - dispatch-tier
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/v2/health/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3

  # ============================================================================
  # 4. MEMORY STORAGE GRID (6-NODE SHARDED REDIS CLUSTER)
  # ============================================================================
  redis-node-1:
    image: redis:7.2-alpine
    container_name: driver-redis-node-1
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes", "--protected-mode", "no"]
    ports:
      - "6379:6379"
    networks:
      - dispatch-tier
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-2:
    image: redis:7.2-alpine
    container_name: driver-redis-node-2
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes", "--protected-mode", "no"]
    ports:
      - "6380:6379"
    networks:
      - dispatch-tier
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-3:
    image: redis:7.2-alpine
    container_name: driver-redis-node-3
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes", "--protected-mode", "no"]
    ports:
      - "6381:6379"
    networks:
      - dispatch-tier
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-4:
    image: redis:7.2-alpine
    container_name: driver-redis-node-4
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes", "--protected-mode", "no"]
    ports:
      - "6382:6379"
    networks:
      - dispatch-tier
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-5:
    image: redis:7.2-alpine
    container_name: driver-redis-node-5
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes", "--protected-mode", "no"]
    ports:
      - "6383:6379"
    networks:
      - dispatch-tier
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-6:
    image: redis:7.2-alpine
    container_name: driver-redis-node-6
    command: ["redis-server", "--cluster-enabled", "yes", "--cluster-config-file", "nodes.conf", "--cluster-node-timeout", "5000", "--appendonly", "yes", "--protected-mode", "no"]
    ports:
      - "6384:6379"
    networks:
      - dispatch-tier
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Automation service that initializes cluster state across nodes on startup
  redis-cluster-orchestrator:
    image: redis:7.2-alpine
    container_name: redis_cluster_bootstrap
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
      redis-node-4:
        condition: service_healthy
      redis-node-5:
        condition: service_healthy
      redis-node-6:
        condition: service_healthy
    networks:
      - dispatch-tier
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        apk add --no-cache bind-tools
        get_ip() { idx=0; while [ $$idx -lt 10 ]; do ip=$$(getent hosts driver-redis-node-$$1 | awk '{print $$1}'); if [ ! -z "$$ip" ]; then echo "$$ip"; return 0; fi; sleep 1; idx=$$((idx+1)); done; return 1; }
        
        # Build node endpoint array map
        NODES=""
        for i in 1 2 3 4 5 6; do
          ip=$$(get_ip $$i)
          NODES="$$NODES $$ip:6379"
        done
        
        echo "Initializing 6-Shard Redis Topology across nodes: $$NODES"
        echo "yes" | redis-cli --cluster create $$NODES --cluster-replicas 1
        echo "Cluster handshake complete."

  # ============================================================================
  # 5. SCHEMA MIGRATIONS — single source of truth (golang-migrate)
  # Runs all pending up-migrations against the DB, then exits. Every DB-backed
  # service waits for this to complete before starting.
  # ============================================================================
  db-migrator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_SERVICE: migrate
    container_name: dispatch_db_migrator
    environment:
      - DATABASE_URL=postgres://postgres:password@spatial-db:5432/delivery_platform?sslmode=disable
    depends_on:
      spatial-db:
        condition: service_healthy
    restart: "no"
    networks:
      - dispatch-tier

  reconciler-daemon:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_SERVICE: reconciler
    container_name: dispatch_reconciler_prod
    environment:
      - DATABASE_URL=postgres://postgres:password@spatial-db:5432/delivery_platform?sslmode=disable
      - KAFKA_BROKERS=kafka-broker:9092
      - CITY_PREFIX=KOL
    depends_on:
      spatial-db:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    networks:
      - dispatch-tier

  telemetry-ingestion:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_SERVICE: ingestion
    container_name: dispatch_ingestion_prod
    environment:
      - KAFKA_BROKERS=kafka-broker:9092
      - REDIS_CLUSTER_NODES=redis-node-1:6379
    ports:
      - "50051:50051"
    depends_on:
      kafka-broker:
        condition: service_healthy
      redis-cluster-orchestrator:
        condition: service_completed_successfully
    networks:
      - dispatch-tier

  matching-engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_SERVICE: dispatch
    container_name: dispatch_matcher_prod
    environment:
      - DATABASE_URL=postgres://postgres:password@spatial-db:5432/delivery_platform?sslmode=disable
      - KAFKA_BROKERS=kafka-broker:9092
      - REDIS_CLUSTER_NODES=redis-node-1:6379
      - TRITON_SERVER_URL=triton-server:8001
      - ALGORITHM_STRATEGY=GREEDY
    depends_on:
      spatial-db:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
      redis-cluster-orchestrator:
        condition: service_completed_successfully
      triton-server:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    networks:
      - dispatch-tier

  surge-engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_SERVICE: surge
    container_name: dispatch_surge_prod
    environment:
      - KAFKA_BROKERS=kafka-broker:9092
      - REDIS_CLUSTER_NODES=redis-node-1:6379
      - SURGE_CITY_PREFIX=KOL
      - SURGE_TRACKED_CELLS=88754cb247fffff,88283473fffffff
    depends_on:
      kafka-broker:
        condition: service_healthy
      redis-cluster-orchestrator:
        condition: service_completed_successfully
    networks:
      - dispatch-tier

  pricing-sync:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_SERVICE: pricing
    container_name: dispatch_pricing_prod
    environment:
      - KAFKA_BROKERS=kafka-broker:9092
      - REDIS_CLUSTER_ADDRS=redis-node-1:6379
      - PRICING_GROUP_ID=pricing-service-consumer-group
    depends_on:
      kafka-broker:
        condition: service_healthy
      redis-cluster-orchestrator:
        condition: service_completed_successfully
    networks:
      - dispatch-tier

  telemetry-pruner:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_SERVICE: pruner
    container_name: dispatch_pruner_prod
    environment:
      - DATABASE_URL=postgres://postgres:password@spatial-db:5432/delivery_platform?sslmode=disable
      - REDIS_CLUSTER_NODES=redis-node-1:6379
    depends_on:
      spatial-db:
        condition: service_healthy
      redis-cluster-orchestrator:
        condition: service_completed_successfully
      db-migrator:
        condition: service_completed_successfully
    networks:
      - dispatch-tier

  offer-expiry-janitor:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_SERVICE: expiry
    container_name: dispatch_expiry_janitor_prod
    environment:
      - DATABASE_URL=postgres://postgres:password@spatial-db:5432/delivery_platform?sslmode=disable
      - REDIS_CLUSTER_NODES=redis-node-1:6379
      - KAFKA_BROKERS=kafka-broker:9092
      - CITY_PREFIX=KOL
    depends_on:
      spatial-db:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
      redis-cluster-orchestrator:
        condition: service_completed_successfully
      db-migrator:
        condition: service_completed_successfully
    networks:
      - dispatch-tier

  spatial-analytics:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_SERVICE: analytics
    container_name: dispatch_spatial_analytics_prod
    ports:
      - "8089:8089"
    environment:
      - KAFKA_BROKERS=kafka-broker:9092
      - CITY_PREFIX=KOL
      - ANALYTICS_PORT=8089
    depends_on:
      kafka-broker:
        condition: service_healthy
    networks:
      - dispatch-tier

  outbox-notification-engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_SERVICE: notification
    container_name: dispatch_notification_prod
    environment:
      - DATABASE_URL=postgres://postgres:password@spatial-db:5432/delivery_platform?sslmode=disable
    depends_on:
      spatial-db:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    networks:
      - dispatch-tier

  public-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_SERVICE: gateway
    container_name: dispatch_gateway_prod
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:password@spatial-db:5432/delivery_platform?sslmode=disable
      - REDIS_CLUSTER_NODES=redis-node-1:6379
      - KAFKA_BROKERS=kafka-broker:9092
      - HTTP_PORT=8080
      - JWT_SECRET_SIGNING_KEY=kolkata_marketplace_backbone_secret_token_string
      - SUPPORTED_REGIONS_MATRIX=KOL,BLR
    depends_on:
      spatial-db:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
      redis-cluster-orchestrator:
        condition: service_completed_successfully
    networks:
      - dispatch-tier
