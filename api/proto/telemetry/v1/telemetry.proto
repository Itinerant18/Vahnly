syntax = "proto3";

package telemetry.v1;

option go_package = "github.com/platform/driver-delivery/pkg/api/telemetry/v1;telemetryv1";

service LocationIngestionService {
  rpc ClientStreamPositions(stream IngestionRequest) returns (IngestionResponse);
}

message IngestionRequest {
  string driver_id = 1;
  string city_prefix = 2;
  double latitude = 3;
  double longitude = 4;
  float bearing = 5;
  float speed_kms = 6;
  int64 timestamp_utc = 7;
}

message IngestionResponse {
  bool success = 1;
  int64 recorded_at = 2;
}
