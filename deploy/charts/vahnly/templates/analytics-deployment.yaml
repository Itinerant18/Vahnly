apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vahnly.name" . }}-analytics
  labels:
    app: analytics
spec:
  replicas: {{ .Values.analytics.replicaCount }}
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
        - name: analytics
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "vahnly.securityContext" . | nindent 12 }}
          command: ["/entrypoint"]
          env:
            - name: TARGET_SERVICE
              value: "analytics"
            - name: KAFKA_BROKERS
              value: {{ .Values.global.env.kafkaBrokers | quote }}
            - name: CITY_PREFIX
              value: {{ .Values.global.region | quote }}
            - name: ANALYTICS_PORT
              value: {{ .Values.analytics.port | quote }}
            {{- include "vahnly.kafkaSecurityEnv" . | nindent 12 }}
          ports:
            - containerPort: {{ .Values.analytics.port }}
              name: http
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.analytics.resources | nindent 12 }}
