apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drivers-for-u.name" . }}-surge
  labels:
    app: surge
spec:
  replicas: {{ .Values.surge.replicaCount }}
  selector:
    matchLabels:
      app: surge
  template:
    metadata:
      labels:
        app: surge
    spec:
      containers:
        - name: surge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "drivers-for-u.securityContext" . | nindent 12 }}
          command: ["/entrypoint"]
          env:
            - name: KAFKA_BROKERS
              value: {{ .Values.global.env.kafkaBrokers | quote }}
            - name: REDIS_CLUSTER_NODES
              value: {{ .Values.global.env.redisClusterNodes | quote }}
            {{- include "drivers-for-u.redisAuthEnv" . | nindent 12 }}
            - name: SURGE_CITY_PREFIX
              value: {{ .Values.global.region | quote }}
            - name: SURGE_TRACKED_CELLS
              value: {{ .Values.surge.trackedCells | quote }}
            {{- include "drivers-for-u.kafkaSecurityEnv" . | nindent 12 }}
          ports:
            - containerPort: 8080
              name: health
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.surge.resources | nindent 12 }}
