# PodDisruptionBudgets keep a minimum number of pods serving during voluntary
# disruptions (node drains, rolling updates). Defined for every service that runs
# >= 2 replicas (a PDB on a 1-replica Deployment would block all node drains).
# pruner/expiry/notification became multi-replica once their sweeps were made
# concurrency-safe (INF-1b).
{{- $svcs := list "gateway" "dispatch" "ingestion" "pricing" "surge" "reconciler" "rebalancer" "pruner" "expiry" "notification" }}
{{- range $svc := $svcs }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "vahnly.name" $ }}-{{ $svc }}-pdb
  labels:
    app: {{ $svc }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: {{ $svc }}
{{- end }}
