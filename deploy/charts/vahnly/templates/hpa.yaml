# HorizontalPodAutoscalers for the traffic-sensitive services. Dispatch already
# scales on Kafka lag via its KEDA ScaledObject, so it is intentionally excluded.
# Requires metrics-server in the cluster.
{{- $hpas := list
  (dict "name" "gateway"   "min" 4 "max" 20 "cpu" 70)
  (dict "name" "ingestion" "min" 2 "max" 12 "cpu" 70)
  (dict "name" "surge"     "min" 2 "max" 8  "cpu" 75)
}}
{{- range $h := $hpas }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "vahnly.name" $ }}-{{ $h.name }}-hpa
  labels:
    app: {{ $h.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "vahnly.name" $ }}-{{ $h.name }}
  minReplicas: {{ $h.min }}
  maxReplicas: {{ $h.max }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $h.cpu }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
{{- end }}
