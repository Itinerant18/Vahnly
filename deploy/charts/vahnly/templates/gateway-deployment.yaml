apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vahnly.name" . }}-gateway
  labels:
    app: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      terminationGracePeriodSeconds: {{ .Values.gateway.terminationGracePeriodSeconds | default 15 }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "vahnly.securityContext" . | nindent 12 }}
          command: ["/entrypoint"]
          env:
            - name: TARGET_SERVICE
              value: "gateway"
            - name: HTTP_PORT
              value: {{ .Values.gateway.httpPort | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahnly.name" . }}-db-credentials
                  key: database-url
            - name: KAFKA_BROKERS
              value: {{ .Values.global.env.kafkaBrokers | quote }}
            - name: REDIS_CLUSTER_NODES
              value: {{ .Values.global.env.redisClusterNodes | quote }}
            {{- include "vahnly.redisAuthEnv" . | nindent 12 }}
            - name: JWT_SECRET_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahnly.name" . }}-app-secrets
                  key: jwt-signing-key
            - name: FIELD_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahnly.name" . }}-app-secrets
                  key: field-encryption-key
            - name: PAYMENT_WEBHOOK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahnly.name" . }}-app-secrets
                  key: payment-webhook-signing-secret
            - name: S3_BUCKET
              value: {{ .Values.objectStorage.bucket | quote }}
            - name: S3_REGION
              value: {{ .Values.objectStorage.region | quote }}
            - name: S3_ENDPOINT
              value: {{ .Values.objectStorage.endpoint | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahnly.name" . }}-app-secrets
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahnly.name" . }}-app-secrets
                  key: aws-secret-access-key
            - name: SUPPORTED_REGIONS_MATRIX
              value: {{ .Values.gateway.supportedRegions | quote }}
            - name: METRICS_PORT
              value: {{ .Values.gateway.metricsPort | default 9090 | quote }}
            - name: APP_VERSION
              value: {{ .Values.image.tag | quote }}
            {{- include "vahnly.kafkaSecurityEnv" . | nindent 12 }}
          ports:
            - containerPort: {{ .Values.gateway.httpPort }}
              name: http
            - containerPort: {{ .Values.gateway.metricsPort | default 9090 }}
              name: metrics
          livenessProbe:
            httpGet:
              # Lenient: only confirms the process is alive. A DB/Redis blip must
              # not fail liveness (that would kill an otherwise-healthy pod).
              path: /live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["gateway"]
                topologyKey: "kubernetes.io/hostname"
