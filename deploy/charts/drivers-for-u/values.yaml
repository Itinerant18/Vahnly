# =============================================================================
# DEFAULT CHART VALUES
# Production overrides live in deploy/production-values.yaml.
# Deploy into a single namespace so the service-DNS below resolves:
#   helm install drivers-for-u ./deploy/charts/drivers-for-u -n dispatch
# =============================================================================
global:
  environment: production
  region: KOL
  regionMatrix: ["KOL", "BLR"]
  logLevel: warn
  metricsEnabled: true

# Toggle baseline NetworkPolicies (default-deny ingress + scoped egress). Requires
# a NetworkPolicy-enforcing CNI (Calico/Cilium).
networkPolicy:
  enabled: true

# Monitoring integration. namespace is where kube-prometheus-stack runs; the
# gateway metrics NetworkPolicy allows scrapes only from this namespace (which
# must carry the label name=<namespace>).
monitoring:
  namespace: monitoring

  # In-cluster connection strings. Every data-tier service is assumed to live in
  # the same namespace (dispatch). Keep kafkaBrokers consistent with the KEDA
  # ScaledObject bootstrapServers under dispatch.autoscaling.kafka below.
  env:
    # sslmode=require encrypts without CA verification. Use verify-full only once
    # a CA bundle is mounted into the pods, otherwise the TLS handshake fails.
    # PLACEHOLDER — the password must be injected via SealedSecret/external-secret,
    # never committed here. Rotate any password that was previously in git history.
    # pool_max_conns caps each service's pool so 15 services can't exhaust Postgres
    # max_connections; statement_timeout (ms) stops a runaway query holding locks
    # indefinitely. For real scale, front Postgres with PgBouncer and raise the cap.
    databaseUrl: "postgresql://app_gateway:REPLACE_ME_VIA_SEALED_SECRET@spatial-db.dispatch.svc.cluster.local:5432/delivery_platform?sslmode=require&pool_max_conns=8&statement_timeout=15000"
    kafkaBrokers: "kafka-cluster-kafka-bootstrap.dispatch.svc.cluster.local:9092"
    redisClusterNodes: "redis-cluster.dispatch.svc.cluster.local:6379"
    tritonServerUrl: "triton-inference-service.dispatch.svc.cluster.local:8001"

# Single multi-target image. The compiled binary is service-specific (built with
# --build-arg TARGET_SERVICE=<svc>); publish one tag per service or override
# image.repository per environment. TARGET_SERVICE is still passed for clarity.
image:
  repository: drivers-for-u/platform
  tag: v1.2.0
  pullPolicy: IfNotPresent

# Auth/crypto material. PLACEHOLDERS — override with a SealedSecret or external
# secret operator. NEVER commit real values here.
secrets:
  jwtSigningKey: "REPLACE_ME_VIA_SEALED_SECRET"
  fieldEncryptionKey: "REPLACE_ME_VIA_SEALED_SECRET"
  paymentWebhookSigningSecret: "REPLACE_ME_VIA_SEALED_SECRET"
  awsAccessKeyId: "REPLACE_ME_VIA_SEALED_SECRET"
  awsSecretAccessKey: "REPLACE_ME_VIA_SEALED_SECRET"
  kafkaSaslUsername: "REPLACE_ME_VIA_SEALED_SECRET"
  kafkaSaslPassword: "REPLACE_ME_VIA_SEALED_SECRET"
  redisPassword: "REPLACE_ME_VIA_SEALED_SECRET"

# Kafka client security. Enable both for production SASL_SSL (PLAIN over TLS).
# All producers/consumers read KAFKA_TLS_ENABLED + KAFKA_SASL_* via kafkacfg.
# IMPORTANT: only flip these on once the broker has the matching listener + ACLs,
# and every Kafka-talking deployment includes drivers-for-u.kafkaSecurityEnv.
kafka:
  tlsEnabled: false
  saslEnabled: false

# Redis client auth. Enable in production once the Redis cluster requires AUTH and
# secrets.redisPassword is injected via SealedSecret. No-op (no REDIS_PASSWORD env)
# when off, so passwordless local/dev clusters keep working.
redis:
  authEnabled: false

# Public HTTPS ingress for the gateway. Disabled by default so local/dev installs
# stay ClusterIP-only. In production set ingress.enabled=true with a real host, an
# nginx ingress controller, and a cert-manager ClusterIssuer for auto-renewed TLS.
# adminAllowlist.sourceRanges restricts /api/v1/admin to office/VPN CIDRs — LEAVE IT
# SET in prod; an empty list leaves the admin API open via the main ingress.
ingress:
  enabled: false
  className: nginx
  host: api.example.com
  tls:
    enabled: true
    secretName: gateway-tls
    clusterIssuer: letsencrypt-prod
  adminAllowlist:
    sourceRanges: []

# Durable object storage for driver KYC documents. Leave bucket empty to fall back
# to ephemeral local disk (NOT for production). endpoint is for S3-compatible
# services (MinIO/Supabase); leave empty for AWS S3.
objectStorage:
  bucket: "driversforu-kyc-vault"
  region: "ap-south-1"
  endpoint: ""

# -----------------------------------------------------------------------------
# Public API gateway — the only externally reachable service.
# -----------------------------------------------------------------------------
gateway:
  replicaCount: 4
  httpPort: 8080
  # Internal Prometheus scrape port. Kept off httpPort so a NetworkPolicy can
  # restrict /metrics to the monitoring namespace only (see networkpolicies.yaml).
  metricsPort: 9090
  supportedRegions: "KOL,BLR"
  terminationGracePeriodSeconds: 15
  resources:
    limits: { cpu: "1000m", memory: "512Mi" }
    requests: { cpu: "500m", memory: "256Mi" }

# -----------------------------------------------------------------------------
# Kuhn-Munkres (Hungarian) matching engine.
# -----------------------------------------------------------------------------
dispatch:
  replicaCount: 2
  algorithmStrategy: "HUNGARIAN"
  resources:
    limits: { cpu: "4000m", memory: "2Gi" }
    requests: { cpu: "2000m", memory: "1Gi" }
  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 40
    cooldownPeriod: 120
    kafka:
      # If Kafka runs in another namespace, set the FQDN here accordingly.
      bootstrapServers: "kafka-cluster-kafka-bootstrap.dispatch.svc:9092"
      topic: "order.created"
      # MUST match the consumer group used in cmd/dispatch/main.go.
      consumerGroup: "dispatch-matching-group"
      lagThreshold: "1000"

ingestion:
  replicaCount: 2
  resources:
    limits: { cpu: "1000m", memory: "512Mi" }
    requests: { cpu: "500m", memory: "256Mi" }

pricing:
  replicaCount: 2
  groupID: "pricing-service-consumer-group"
  resources:
    limits: { cpu: "500m", memory: "256Mi" }
    requests: { cpu: "250m", memory: "128Mi" }

# pruner/expiry/notification now run 2 replicas: each sweep is guarded against
# concurrent double-processing — notification claims outbox rows with FOR UPDATE
# SKIP LOCKED; pruner/expiry serialize each sweep with pg_try_advisory_lock (single
# active sweeper, failover on the next tick). See INF-1b.
pruner:
  replicaCount: 2
  resources:
    limits: { cpu: "500m", memory: "256Mi" }
    requests: { cpu: "100m", memory: "128Mi" }

reconciler:
  replicaCount: 2 # idempotent (events tagged reconciled:true) + has /health, /ready
  resources:
    limits: { cpu: "500m", memory: "256Mi" }
    requests: { cpu: "100m", memory: "128Mi" }

surge:
  replicaCount: 2 # >=2: surge is traffic-sensitive and was a single point of failure
  trackedCells: "88754cb247fffff,88283473fffffff"
  resources:
    limits: { cpu: "500m", memory: "256Mi" }
    requests: { cpu: "250m", memory: "128Mi" }

notification:
  replicaCount: 2
  resources:
    limits: { cpu: "500m", memory: "256Mi" }
    requests: { cpu: "100m", memory: "128Mi" }

expiry:
  replicaCount: 2
  resources:
    limits: { cpu: "500m", memory: "256Mi" }
    requests: { cpu: "100m", memory: "128Mi" }

analytics:
  replicaCount: 1
  port: 8089
  resources:
    limits: { cpu: "500m", memory: "256Mi" }
    requests: { cpu: "250m", memory: "128Mi" }

rebalancer:
  replicaCount: 2 # idempotent recompute (overwrites Redis keys / re-publishes nudges)
  httpAddr: ":8090"
  resources:
    limits: { cpu: "500m", memory: "256Mi" }
    requests: { cpu: "100m", memory: "128Mi" }

# Triton is GPU-heavy and off by default. Enable only on GPU node pools, or point
# global.env.tritonServerUrl at an externally managed Triton instance.
triton:
  enabled: false
  image: nvcr.io/nvidia/tritonserver:24.01-py3
  modelRepository: "/models"
  resources:
    limits: { cpu: "2000m", memory: "4Gi" }
    requests: { cpu: "1000m", memory: "2Gi" }
