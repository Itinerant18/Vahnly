global:
  image:
    repository: "drivers-for-u-service"
    tag: "latest"
    pullPolicy: IfNotPresent

# Federated Shared-Nothing Region Shards Matrix Definitions
regions:
  kolkata:
    enabled: true
    cityPrefix: "KOL"
    replicaCount:
      ingestion: 3
      dispatch: 2
    env:
      kafkaBrokers: "kafka-kol-svc.dispatch-kol.svc.cluster.local:9092"
      redisClusterNodes: "redis-kol-svc.dispatch-kol.svc.cluster.local:6379"
      databaseUrl: "postgres://postgres:password@db-kol-svc.dispatch-kol.svc.cluster.local:5432/delivery_kol?sslmode=disable"
      tritonServerUrl: "triton-kol-svc.dispatch-kol.svc.cluster.local:8001"
    resources:
      dispatch:
        limits: { cpu: "2000m", memory: "1Gi" }
        requests: { cpu: "500m", memory: "512Mi" }

  bengaluru:
    enabled: true
    cityPrefix: "BLR"
    replicaCount:
      ingestion: 4
      dispatch: 3
    env:
      kafkaBrokers: "kafka-blr-svc.dispatch-blr.svc.cluster.local:9092"
      redisClusterNodes: "redis-blr-svc.dispatch-blr.svc.cluster.local:6379"
      databaseUrl: "postgres://postgres:password@db-blr-svc.dispatch-blr.svc.cluster.local:5432/delivery_blr?sslmode=disable"
      tritonServerUrl: "triton-blr-svc.dispatch-blr.svc.cluster.local:8001"
    resources:
      dispatch:
        limits: { cpu: "4000m", memory: "2Gi" }
        requests: { cpu: "1000m", memory: "1Gi" }

  mumbai:
    enabled: false # Dormant initialization flag until real-world market entry
    cityPrefix: "BOM"
    replicaCount:
      ingestion: 2
      dispatch: 1
    env:
      kafkaBrokers: "kafka-bom-svc.dispatch-bom.svc.cluster.local:9092"
      redisClusterNodes: "redis-bom-svc.dispatch-bom.svc.cluster.local:6379"
      databaseUrl: "postgres://postgres:password@db-bom-svc.dispatch-bom.svc.cluster.local:5432/delivery_bom?sslmode=disable"
      tritonServerUrl: "triton-bom-svc.dispatch-bom.svc.cluster.local:8001"
