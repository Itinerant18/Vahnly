# =============================================================================
# GLOBAL PRODUCTION MATRIX PROFILE CONFIGURATIONS
# =============================================================================
global:
  environment: production
  regionMatrix: ["KOL", "BLR"]
  logLevel: warn
  metricsEnabled: true

# =============================================================================
# PUBLIC API GATEWAY & BFF LAYER (SERVICE NODE INTERFACES)
# =============================================================================
public-gateway:
  replicaCount: 4
  terminationGracePeriodSeconds: 15 # Protects Milestone 16 & 31 binary connection draining loops

  image:
    repository: drivers-for-u/public-gateway
    tag: v1.2.0
    pullPolicy: IfNotPresent

  resources:
    limits:
      cpu: "1000m"
      memory: "512Mi"
    requests:
      cpu: "500m"
      memory: "256Mi"

  env:
    PORT: "8080"
    KAFKA_BROKERS: "kafka-cluster-kafka-bootstrap.dispatch.svc.cluster.local:9092"
    REDIS_CLUSTER_ADDRS: "redis-cluster.dispatch.svc.cluster.local:6379"
    DATABASE_URL: "postgresql://app_gateway:HardenedProdPassword@spatial-db.dispatch.svc.cluster.local:5432/delivery_platform?sslmode=verify-full"

  # Real-time infrastructure health checking configurations
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2

  # Prevent scheduling multiples of this service on the same node to avoid shared failures
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - public-gateway
          topologyKey: "kubernetes.io/hostname"

# =============================================================================
# KUHN-MUNKRES MATCHING ENGINE (COMPUTATIONAL MATCH CORES)
# =============================================================================
matching-engine:
  replicaCount: 2
  
  resources:
    limits:
      cpu: "4000m" # High compute allocation to handle intense combinatorial optimization load spikes
      memory: "2Gi"
    requests:
      cpu: "2000m"
      memory: "1Gi"

  env:
    ALGORITHM_STRATEGY: "HUNGARIAN"
    TRITON_SERVER_URL: "triton-inference-service.intelligence.svc.cluster.local:8001"
    METRICS_PORT: "8080"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    # Powered by KEDA: scale up based directly on pending Kafka broker lag sizes
    kafkaTrigger:
      topic: "order.created"
      consumerGroup: "matching-engine-group"
      lagThreshold: "20"
