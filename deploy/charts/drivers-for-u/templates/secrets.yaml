apiVersion: v1
kind: Secret
metadata:
  name: {{ include "drivers-for-u.name" . }}-db-credentials
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  database-url: {{ .Values.global.env.databaseUrl | quote }}
---
# Auth/crypto material consumed by the gateway deployment. Override the source
# values via SealedSecret/external-secret; the defaults in values.yaml are
# placeholders only.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "drivers-for-u.name" . }}-app-secrets
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  jwt-signing-key: {{ .Values.secrets.jwtSigningKey | quote }}
  field-encryption-key: {{ .Values.secrets.fieldEncryptionKey | quote }}
  payment-webhook-signing-secret: {{ .Values.secrets.paymentWebhookSigningSecret | quote }}
  aws-access-key-id: {{ .Values.secrets.awsAccessKeyId | quote }}
  aws-secret-access-key: {{ .Values.secrets.awsSecretAccessKey | quote }}
  kafka-sasl-username: {{ .Values.secrets.kafkaSaslUsername | quote }}
  kafka-sasl-password: {{ .Values.secrets.kafkaSaslPassword | quote }}
