{{- if .Values.triton.enabled }}
apiVersion: v1
kind: Service
metadata:
  # Name matches the host portion of global.env.tritonServerUrl so the matching
  # engine resolves it. Adjust both together if you rename this.
  name: triton-inference-service
  labels:
    app: triton
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: grpc
      name: grpc
    - port: 8000
      targetPort: http
      name: http
  selector:
    app: triton
{{- end }}
