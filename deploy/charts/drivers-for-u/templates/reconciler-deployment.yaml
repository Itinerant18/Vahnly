apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drivers-for-u.name" . }}-reconciler
  labels:
    app: reconciler
spec:
  replicas: {{ .Values.reconciler.replicaCount }}
  selector:
    matchLabels:
      app: reconciler
  template:
    metadata:
      labels:
        app: reconciler
    spec:
      containers:
        - name: reconciler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "drivers-for-u.securityContext" . | nindent 12 }}
          command: ["/entrypoint"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "drivers-for-u.name" . }}-db-credentials
                  key: database-url
            - name: KAFKA_BROKERS
              value: {{ .Values.global.env.kafkaBrokers | quote }}
            - name: CITY_PREFIX
              value: {{ .Values.global.region | quote }}
            - name: RECONCILER_METRICS_PORT
              value: "8091"
          ports:
            - containerPort: 8091
              name: metrics
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.reconciler.resources | nindent 12 }}
