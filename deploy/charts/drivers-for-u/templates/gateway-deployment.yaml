apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drivers-for-u.name" . }}-gateway
  labels:
    app: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      terminationGracePeriodSeconds: {{ .Values.gateway.terminationGracePeriodSeconds | default 15 }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/entrypoint"]
          env:
            - name: TARGET_SERVICE
              value: "gateway"
            - name: HTTP_PORT
              value: {{ .Values.gateway.httpPort | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "drivers-for-u.name" . }}-db-credentials
                  key: database-url
            - name: KAFKA_BROKERS
              value: {{ .Values.global.env.kafkaBrokers | quote }}
            - name: REDIS_CLUSTER_NODES
              value: {{ .Values.global.env.redisClusterNodes | quote }}
            - name: JWT_SECRET_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "drivers-for-u.name" . }}-app-secrets
                  key: jwt-signing-key
            - name: FIELD_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "drivers-for-u.name" . }}-app-secrets
                  key: field-encryption-key
            - name: SUPPORTED_REGIONS_MATRIX
              value: {{ .Values.gateway.supportedRegions | quote }}
          ports:
            - containerPort: {{ .Values.gateway.httpPort }}
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["gateway"]
                topologyKey: "kubernetes.io/hostname"
