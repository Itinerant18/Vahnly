# =============================================================================
# PRODUCTION OVERRIDES
#   helm upgrade --install drivers-for-u ./deploy/charts/drivers-for-u \
#     -n dispatch -f deploy/production-values.yaml
#
# Secrets (secrets.jwtSigningKey, secrets.fieldEncryptionKey, and the DB password
# inside global.env.databaseUrl) MUST be supplied at deploy time via a SealedSecret
# or --set from a secret manager — do not hardcode them in this file.
# =============================================================================
global:
  environment: production
  region: KOL
  logLevel: warn

gateway:
  replicaCount: 4

dispatch:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 12
    kafka:
      lagThreshold: "15"

ingestion:
  replicaCount: 3
