# =============================================================================
# PRODUCTION OVERRIDES
#   helm upgrade --install vahnly ./deploy/charts/vahnly \
#     -n dispatch -f deploy/production-values.yaml
#
# Secrets (secrets.jwtSigningKey, secrets.fieldEncryptionKey, and the DB password
# inside global.env.databaseUrl) MUST be supplied at deploy time via a SealedSecret
# or --set from a secret manager — do not hardcode them in this file.
# =============================================================================
global:
  environment: production
  region: KOL
  logLevel: warn

gateway:
  replicaCount: 4

dispatch:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 12
    kafka:
      lagThreshold: "15"

ingestion:
  replicaCount: 3

# Redis cluster requires AUTH in production; inject secrets.redisPassword via a
# SealedSecret/--set so REDIS_PASSWORD is mounted into every Redis-talking pod.
redis:
  authEnabled: true

# Public HTTPS entrypoint. Replace host + adminAllowlist.sourceRanges with the real
# production domain and the office/VPN egress CIDRs before deploy. clusterIssuer must
# match an installed cert-manager ClusterIssuer.
ingress:
  enabled: true
  host: api.aniket.site # REPLACE with the production API hostname
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod
  adminAllowlist:
    sourceRanges: [] # REPLACE with office/VPN CIDRs, e.g. ["203.0.113.0/24"]
