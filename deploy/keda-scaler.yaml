apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: matching-engine-scaler
  namespace: dispatch
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: matching-engine-pod # Targets your engine pods
  minReplicaCount: 4         # Scale baseline avoiding cold starts
  maxReplicaCount: 40        # Upper scale capacity protection limit
  cooldownPeriod: 120
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
          - type: Percent
            value: 100       # Aggressive step-scaling during peak load
            periodSeconds: 15
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: kafka-cluster-kafka-bootstrap.infrastructure.svc:9092
      topic: order.created
      consumerGroup: dispatch-matching-group # Tracks lag directly on ingestion pipelines
      lagThreshold: "1000"                   # Scale out if group lag exceeds 1,000 backlogged events
